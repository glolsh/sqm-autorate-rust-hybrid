name: Build SQM-Autorate (Dual Format)

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for OpenWrt ${{ matrix.owrt_ver }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - owrt_ver: "24.10.0"
            pkg_ext: "ipk"
            sdk_url: "https://downloads.openwrt.org/releases/24.10.0/targets/rockchip/armv8/openwrt-sdk-24.10.0-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          
          - owrt_ver: "25.12.2"
            pkg_ext: "apk"
            sdk_url: "https://downloads.openwrt.org/releases/25.12.2/targets/rockchip/armv8/openwrt-sdk-25.12.2-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.owrt_ver }}

      - name: Install cross (Binary Release)
        run: |
          mkdir -p ~/.cargo/bin
          wget -qO cross.tar.gz "https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf cross.tar.gz -C ~/.cargo/bin
          rm cross.tar.gz

      - name: Build Rust Binary
        run: |
          ~/.cargo/bin/cross build --release --target aarch64-unknown-linux-musl

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget python3-pyelftools python3-setuptools python3-dev

      - name: Prepare OpenWrt SDK & Package
        run: |
          wget -qO sdk.tar.zst "${{ matrix.sdk_url }}"
          mkdir openwrt-sdk
          tar -I zstd -xf sdk.tar.zst -C openwrt-sdk --strip-components=1

          cd openwrt-sdk
          PKG_DIR="package/sqm-autorate"
          mkdir -p "$PKG_DIR"

          cp -r $GITHUB_WORKSPACE/openwrt-pkg/* "$PKG_DIR/"
          cp $GITHUB_WORKSPACE/target/aarch64-unknown-linux-musl/release/sqm-autorate-rust "$PKG_DIR/"

          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${{ github.run_number }}/" "$PKG_DIR/Makefile"

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          make defconfig
          make package/sqm-autorate/compile V=s -j$(nproc)

          FILE_PATH=$(find bin/packages/ -name "sqm-autorate*.${{ matrix.pkg_ext }}" | head -n 1)
          
          if [ -z "$FILE_PATH" ]; then
            echo "Error: Failed to find built .${{ matrix.pkg_ext }} file."
            exit 1
          fi
          
          echo "artifact_path=openwrt-sdk/$FILE_PATH" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sqm-autorate-${{ matrix.owrt_ver }}-rev${{ github.run_number }}
          path: ${{ env.artifact_path }}
          if-no-files-found: error
