name: Build OpenWrt IPK

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    name: Cross-compile & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cross Binary
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cross
          key: ${{ runner.os }}-cross-bin

      - name: Install cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Rust Binary (Step 1)
        run: |
          cross build --release --target aarch64-unknown-linux-musl

      - name: Prepare OpenWrt SDK & Package (Step 2)
        env:
          SDK_URL: "https://downloads.openwrt.org/releases/24.10.0/targets/rockchip/armv8/openwrt-sdk-24.10.0-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
        run: |
          # Download SDK
          sudo apt-get update
          sudo apt-get install -y zstd python3-pyelftools
          wget -qO sdk.tar.zst "$SDK_URL"

          mkdir openwrt-sdk
          tar -xf sdk.tar.zst -C openwrt-sdk --strip-components=1

          # Setup SDK paths
          cd openwrt-sdk

          # Setup package directory
          PKG_DIR="package/sqm-autorate"
          mkdir -p "$PKG_DIR"

          # Copy files from workspace
          cp -r $GITHUB_WORKSPACE/openwrt-pkg/* "$PKG_DIR/"

          # Copy pre-compiled binary into the package directory
          cp $GITHUB_WORKSPACE/target/aarch64-unknown-linux-musl/release/sqm-autorate-rust "$PKG_DIR/"

          # Update package release version using github.run_number
          sed -i "s/PKG_RELEASE:=1/PKG_RELEASE:=${{ github.run_number }}/" "$PKG_DIR/Makefile"

          # Update feeds (required for dependencies like +tc +kmod-sched-cake)
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Build package
          make defconfig
          make package/sqm-autorate/compile V=s

          # Find the built IPK and set it as an output variable
          IPK_FILE=$(find bin/packages/ -name "sqm-autorate_*.ipk" | head -n 1)
          echo "Found IPK: $IPK_FILE"
          echo "ipk_path=openwrt-sdk/$IPK_FILE" >> $GITHUB_ENV

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqm-autorate-ipk
          path: ${{ env.ipk_path }}
