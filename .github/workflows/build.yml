name: Build OpenWrt IPK

on:
  push:
    branches:
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Cross-compile & Package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross (Binary Release)
        run: |
          mkdir -p ~/.cargo/bin
          wget -qO cross.tar.gz "https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf cross.tar.gz -C ~/.cargo/bin
          rm cross.tar.gz

      - name: Build Rust Binary
        run: |
          cross build --release --target aarch64-unknown-linux-musl

      - name: Prepare OpenWrt SDK & Package
        env:
          SDK_URL: "https://downloads.openwrt.org/releases/24.10.0/targets/rockchip/armv8/openwrt-sdk-24.10.0-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd python3-pyelftools
          
          wget -qO sdk.tar.zst "$SDK_URL"
          mkdir openwrt-sdk
          tar -xf sdk.tar.zst -C openwrt-sdk --strip-components=1

          cd openwrt-sdk
          PKG_DIR="package/sqm-autorate"
          mkdir -p "$PKG_DIR"

          cp -r $GITHUB_WORKSPACE/openwrt-pkg/* "$PKG_DIR/"
          cp $GITHUB_WORKSPACE/target/aarch64-unknown-linux-musl/release/sqm-autorate-rust "$PKG_DIR/"

          sed -i "s/PKG_RELEASE:=1/PKG_RELEASE:=${{ github.run_number }}/" "$PKG_DIR/Makefile"

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          make defconfig
          make package/sqm-autorate/compile V=s

          IPK_FILE=$(find bin/packages/ -name "sqm-autorate_*.ipk" | head -n 1)
          
          if [ -z "$IPK_FILE" ]; then
            echo "Error: IPK file not found after build."
            exit 1
          fi
          
          echo "Found IPK: $IPK_FILE"
          echo "ipk_path=openwrt-sdk/$IPK_FILE" >> $GITHUB_ENV

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sqm-autorate-ipk
          path: ${{ env.ipk_path }}
          if-no-files-found: error
